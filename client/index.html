<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO Meta Tags ─────────────────────────────────────── -->
    <title>AI Placement Hub — Ace Your Next Interview</title>
    <meta
      name="description"
      content="AI-powered interview preparation platform. Practice with AI mock interviews, analyze your resume, and generate tailored interview questions to land your dream job."
    />
    <meta name="keywords" content="AI interview, mock interview, resume analyzer, job preparation, interview questions, placement hub" />
    <meta name="author" content="AI Placement Hub" />

    <!-- ── Open Graph / Social Sharing ──────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AI Placement Hub — Ace Your Next Interview" />
    <meta
      property="og:description"
      content="AI-powered interview preparation platform with mock interviews, resume analysis, and personalized question generation."
    />
    <meta property="og:site_name" content="AI Placement Hub" />

    <!-- ── Twitter Card ──────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI Placement Hub — Ace Your Next Interview" />
    <meta
      name="twitter:description"
      content="AI-powered interview preparation platform with mock interviews, resume analysis, and personalized question generation."
    />

    <!-- ── Favicon ────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />

    <!-- ── Google Fonts — Inter ───────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- ── Theme Color (Browser UI) ──────────────────────────── -->
    <meta name="theme-color" content="#6366f1" />
  </head>
  <body>
    <!-- React app mounts here -->
    <div id="root"></div>

    <!-- Vite entry point -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
